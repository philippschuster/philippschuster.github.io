# role: Chair holder Dept. III – Chair of Finance

bio: |
  Welcome! I am a Professor of Finance at University of Stuttgart, Germany. My research focuses on empirical capital markets, asset pricing, market microstructure, and applications of the blockchain technology. Current projects investigate liquidity, frictions, and intermediation in bond and options markets, mutual funds and ETFs, and decentralized exchanges.

